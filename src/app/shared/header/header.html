<header class="w-full">
  <section class="w-full h-full flex items-center justify-between">
    <h2 class="text-2xl font-semibold text-[#193f83]">{{ title() }}</h2>
    <button
      #trigger="matMenuTrigger"
      [matMenuTriggerFor]="menu"
      [class.bg-[#d9dae2]]="trigger.menuOpen"
      class="flex items-center p-2 cursor-pointer hover:bg-[#d9dae2]"
    >
      <span class="mx-4 text-right">
        <p class="text-xl font-semibold text-[#193f83]">{{ getFullName() }}</p>
        <p class="text-lg font-base">{{ user()?.role | role }}</p>
      </span>
      <div class="h-18 w-18 rounded-full bg-[#193f83]"></div>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </section>
</header>
