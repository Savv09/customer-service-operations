<div class="flex items-center justify-center w-full h-screen bg-[#193f83]">
  <main class="flex flex-col items-center w-1/3 h-3/5 p-8 bg-white rounded-lg">
    <header class="mt-8 text-center">
      <h1 class="text-2xl font-bold text-[#183d7e]">Customer Service Operations</h1>
    </header>

    @if (!isLoading()) {
      <section class="w-full flex-1 mt-12">
        <form
          [formGroup]="loginForm"
          (ngSubmit)="login()"
          class="max-w-sm mx-auto"
          aria-label="Login form"
        >
          <h2 class="my-4 text-xl font-medium text-[#183d7e]">Reserved Area</h2>

          <div class="mb-5">
            <!-- Todo: createing a input field component -->
            <label for="email" class="block mb-2 text-sm font-medium text-[#183d7e]"> Email </label>
            <input
              type="email"
              id="email"
              formControlName="email"
              class="block w-full h-12 px-3 py-2 text-sm border rounded-lg shadow focus:outline-none focus:ring-2 focus:ring-[#183d7e] focus:bg-[#ededee]"
              placeholder="Email"
              required
              aria-required="true"
            />
          </div>

          <div class="mb-5">
            <!-- Todo: createing a input field component -->
            <label for="password" class="block mb-2 text-sm font-medium text-[#183d7e]">
              Password
            </label>
            <input
              type="password"
              id="password"
              formControlName="password"
              class="block w-full h-12 px-3 py-2 text-sm border rounded-lg shadow focus:outline-none focus:ring-2 focus:ring-[#183d7e] focus:bg-[#e3e8f4]"
              placeholder="••••••••"
              required
              aria-required="true"
            />
          </div>

          <button
            type="submit"
            class="w-full h-12 mt-4 font-medium text-white bg-[#2459b5] rounded-lg cursor-pointer hover:bg-[#183d7e] focus:outline-none"
          >
            LOGIN
          </button>
        </form>

        @if (isLoginFailed()) {
          <p class="w-full mt-2.5 text-base font-medium text-center text-[#c0392b]">
            Wrong username and/or password.
          </p>
        }
      </section>
    } @else {
      <div class="w-full h-3/4 flex flex-col items-center justify-center">
        <div class="loader"></div>
      </div>
    }
  </main>
</div>
